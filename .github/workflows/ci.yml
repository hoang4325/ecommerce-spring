name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn -B -ntp clean test

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Build service Docker images
        run: |
          docker compose build \
            eureka-server \
            api-gateway \
            auth-service \
            product-service \
            inventory-service \
            cart-service
