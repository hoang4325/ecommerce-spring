services:
  postgres:
    image: postgres:17-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  product-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - product-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  inventory-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - inventory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cart-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - cart-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d cart_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  order-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - order-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  payment-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "127.0.0.1:5437:5432"
    volumes:
      - payment-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  notification-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: ecommerce-eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: ecommerce-auth-service
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ecommerce
      SPRING_DATASOURCE_PASSWORD: ecommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: 5
      EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: 15
      JWT_SECRET: "01234567890123456789012345678901"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: ecommerce-product-service
    depends_on:
      product-postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-postgres:5432/product_db
      SPRING_DATASOURCE_USERNAME: ecommerce
      SPRING_DATASOURCE_PASSWORD: ecommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: 5
      EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: 15
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: ecommerce-inventory-service
    depends_on:
      inventory-postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: ecommerce
      SPRING_DATASOURCE_PASSWORD: ecommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: 5
      EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: 15
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    container_name: ecommerce-cart-service
    depends_on:
      cart-postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      product-service:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://cart-postgres:5432/cart_db
      SPRING_DATASOURCE_USERNAME: ecommerce
      SPRING_DATASOURCE_PASSWORD: ecommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: 5
      EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: 15
      PRODUCT_SERVICE_BASE_URL: http://product-service
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: ecommerce-order-service
    depends_on:
      order-postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: ecommerce
      SPRING_DATASOURCE_PASSWORD: ecommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: 5
      EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: 15
      CART_SERVICE_BASE_URL: http://cart-service
      INVENTORY_SERVICE_BASE_URL: http://inventory-service
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: ecommerce-payment-service
    depends_on:
      payment-postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: ecommerce
      SPRING_DATASOURCE_PASSWORD: ecommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: 5
      EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: 15
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8086/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: ecommerce-notification-service
    depends_on:
      notification-postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: ecommerce
      SPRING_DATASOURCE_PASSWORD: ecommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: 5
      EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: 15
      NOTIFICATION_INTERNAL_TOKEN: local-notification-token
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8087/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    restart: on-failure
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_CLIENT_REGISTRY_FETCH_INTERVAL_SECONDS: 5
      JWT_SECRET: "01234567890123456789012345678901"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres-data:
  product-postgres-data:
  inventory-postgres-data:
  cart-postgres-data:
  order-postgres-data:
  payment-postgres-data:
  notification-postgres-data:
